<mat-nav-list>
  @for (link of links; track link.name) {
    @if (link.separatorBefore) {
      <div class="separator">
        <div class="separator-title">{{link.separatorBefore}}</div>
        <div class="separator-line"></div>
      </div>
    }

    <a mat-list-item
       [activated]="link.isActive"
       [routerLink]="link.url">
      <div matListItemTitle class="mat-list-item-content">
        <mat-icon>{{ link.icon }}</mat-icon>
        {{ link.name }}
      </div>
    </a>
  }
</mat-nav-list>
