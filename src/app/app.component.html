<mat-toolbar class="mat-toolbar">
  <button mat-icon-button (click)="menu.toggle()">
    <mat-icon>menu</mat-icon>
  </button>
  <span>Gestion des stocks</span>
  <div class="profil-infos">
    @if (this.isLoggedIn()) {
      <app-profil></app-profil>
    } @else {
      <button class="logout-button" mat-stroked-button (click)="this.login()">
        Se connecter
      </button>
    }
  </div>
</mat-toolbar>

<mat-drawer-container>
  <mat-drawer #menu mode="side" opened="true">
    <div class="menu-wrapper">
      <app-menu></app-menu>
    </div>
  </mat-drawer>
  <mat-drawer-content>
    <router-outlet></router-outlet>
  </mat-drawer-content>
</mat-drawer-container>
