<h1 mat-dialog-title>Sélection d'une pièce</h1>
<div mat-dialog-content>
  <form>
    <app-autocomplete-multiple label="Pièce"
                               [autocompleteIdField]="this.FIELD_ID"
                               [autocompleteNameFields]="this.FIELDS_NAME"
                               [separator]="this.FIELDS_SEPARATOR"
                               [autocompleteMethod]="this.autocompletePiece.bind(this)"
                               [autocompleteFormControl]="pieceFormControl"/>
  </form>
</div>
<div mat-dialog-actions>
  <button mat-button (click)="save()">Sélectionner</button>
  <button mat-button [matDialogClose]="null">Annuler</button>
</div>
