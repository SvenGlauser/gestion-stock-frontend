<h2 mat-dialog-title>{{ this.dialogTitle }}</h2>

<mat-dialog-content>
  <app-form [formsMap]="this.formsMap"/>
</mat-dialog-content>

<mat-dialog-actions>
  @switch (this.data.type) {
    @case (DialogType.CREATE) {
      <button mat-button (click)="create()">
        Créer
      </button>
    }
    @case (DialogType.MODIFY) {
      <button mat-button (click)="modify()">
        Modifier
      </button>
    }
    @case (DialogType.DELETE) {
      <button mat-button (click)="delete()">
        Supprimer
      </button>
    }
  }
  <button mat-button
          mat-dialog-close>
    Annuler
  </button>
</mat-dialog-actions>
